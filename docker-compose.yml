services:
  db:
    image: mysql:8.0
    container_name: dentfisto-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dentFistoDB
    ports:
      - "3307:3306"
    volumes:
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_logique_metier.sql:/docker-entrypoint-initdb.d/02_logique_metier.sql
      - ./sql/03_seed_data.sql:/docker-entrypoint-initdb.d/03_seed_data.sql
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dentfisto-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: dentFistoDB
      DB_USER: root
      DB_PASS: root
    depends_on:
      db:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:5
    container_name: dentfisto-pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
